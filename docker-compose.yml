services:
  postgres:
    image: postgres:17-alpine
    container_name: openmmes-postgres
    # Logical replication is required by the Electric sync service (see
    # `electric` below). Existing data is unaffected; the flags only change
    # how WAL is written. If you remove Electric, also drop the replication
    # slot it creates: SELECT pg_drop_replication_slot('electric_slot_<...>');
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openmmes}
      POSTGRES_USER: ${POSTGRES_USER:-openmmes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmmes_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-openmmes_user} -d ${POSTGRES_DB:-openmmes}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    # Every other service has this — without it postgres stays down after
    # a host reboot / docker restart while the app containers come back,
    # which surfaces as 502s from Caddy ("could not translate host name
    # 'postgres' to address").
    restart: unless-stopped
    networks:
      - openmmes-network

  backend:
    image: ghcr.io/mes-open/openmes:${OPENMES_VERSION:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openmmes-backend
    environment:
      APP_NAME: ${APP_NAME:-OpenMES}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-openmmes}
      DB_USERNAME: ${POSTGRES_USER:-openmmes_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openmmes_secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@openmmes.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # Broadcasting/Reverb removed — live sync is Electric-only now.
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-null}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    restart: unless-stopped
    networks:
      - openmmes-network

  # ── Electric sync engine (read-path sync from Postgres) ───────────────────
  # https://electric-sql.com — streams Postgres rows to clients via HTTP
  # long-poll. Sits next to the database; Laravel proxies authenticated
  # shape requests to it (see App\Http\Controllers\Api\ShapeProxyController).
  # NOT exposed publicly — only the backend container reaches it on the
  # internal docker network.
  electric:
    image: electricsql/electric:1.6.9
    container_name: openmmes-electric
    environment:
      # Electric needs a superuser-grade connection to manage its replication
      # slot. Reuses the same Postgres credentials as Laravel.
      DATABASE_URL: postgresql://${POSTGRES_USER:-openmmes_user}:${POSTGRES_PASSWORD:-openmmes_secret}@postgres:5432/${POSTGRES_DB:-openmmes}
      ELECTRIC_INSECURE: "true"   # No public exposure; auth is enforced by the Laravel proxy
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openmmes-network

  # ── MQTT listener daemon ──────────────────────────────────────────────────
  # One instance per active MQTT machine_connection.
  # Set MQTT_CONNECTION_ID to the ID from the admin panel.
  # Example: MQTT_CONNECTION_ID=1 docker compose up -d mqtt-listener
  mqtt-listener:
    image: ghcr.io/mes-open/openmes:${OPENMES_VERSION:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openmmes-mqtt-listener
    command:
      ["php", "artisan", "mqtt:listen", "--connection=${MQTT_CONNECTION_ID:-1}"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-openmmes}
      DB_USERNAME: ${POSTGRES_USER:-openmmes_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openmmes_secret}
      BROADCAST_CONNECTION: log
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    restart: unless-stopped
    networks:
      - openmmes-network
    profiles:
      - connectivity

  # ── Modbus TCP poller daemon ──────────────────────────────────────────────
  # One instance per active Modbus machine_connection.
  # Example: MODBUS_CONNECTION_ID=1 docker compose --profile connectivity up -d modbus-poller
  modbus-poller:
    image: ghcr.io/mes-open/openmes:${OPENMES_VERSION:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openmmes-modbus-poller
    command:
      ["php", "artisan", "modbus:poll", "--connection=${MODBUS_CONNECTION_ID:-1}"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-openmmes}
      DB_USERNAME: ${POSTGRES_USER:-openmmes_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openmmes_secret}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    restart: unless-stopped
    networks:
      - openmmes-network
    profiles:
      - connectivity

  # ── OPC UA gateway sidecar (Node.js) ──────────────────────────────────────
  # Bridges an OPC UA server into the OpenMES ingest API. OpenMES cannot speak
  # OPC UA natively. Requires an API token (Admin → API Tokens).
  # Example: OPCUA_CONNECTION_ID=1 OPENMES_API_TOKEN=xxx \
  #          docker compose --profile connectivity up -d opcua-gateway
  opcua-gateway:
    build:
      context: ./opcua-gateway
      dockerfile: Dockerfile
    container_name: openmmes-opcua-gateway
    environment:
      OPENMES_API_URL: ${OPENMES_API_URL:-http://backend:8000}
      OPENMES_API_TOKEN: ${OPENMES_API_TOKEN}
      OPCUA_CONNECTION_ID: ${OPCUA_CONNECTION_ID:-1}
      OPCUA_PASSWORD: ${OPCUA_PASSWORD:-}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - openmmes-network
    profiles:
      - connectivity

  # ── Queue worker ──────────────────────────────────────────────────────────
  # Consumes queued jobs (e.g. MQTT message processing). Start in production if
  # you use MQTT or other queued work.
  # Example: docker compose --profile workers up -d queue-worker
  queue-worker:
    image: ghcr.io/mes-open/openmes:${OPENMES_VERSION:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openmmes-queue-worker
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-openmmes}
      DB_USERNAME: ${POSTGRES_USER:-openmmes_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openmmes_secret}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    restart: unless-stopped
    networks:
      - openmmes-network
    profiles:
      - workers

  caddy:
    image: caddy:2-alpine
    container_name: openmmes-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - openmmes-network

volumes:
  postgres_data:
  backend_storage:
  backend_cache:
  caddy_data:
  caddy_config:

networks:
  openmmes-network:
    driver: bridge
